<svg width="256" height="256" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Молодожёны в ретро-кабриолете">
  <defs>
    <linearGradient id="carc-body" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3a342d"/><stop offset="55%" stop-color="#2a2622"/><stop offset="100%" stop-color="#1c1916"/>
    </linearGradient>
    <linearGradient id="carc-veil" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fdf9f1"/><stop offset="100%" stop-color="#f4ead7"/>
    </linearGradient>
    <linearGradient id="carc-dress" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fbf5ea"/><stop offset="100%" stop-color="#efe2cd"/>
    </linearGradient>
    <linearGradient id="carc-suit" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2a2620"/><stop offset="100%" stop-color="#1f1c18"/>
    </linearGradient>
    <radialGradient id="carc-wheel" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e7c2c3"/><stop offset="55%" stop-color="#3a342d"/><stop offset="100%" stop-color="#1c1916"/>
    </radialGradient>
    <linearGradient id="carc-skin" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f1cdb0"/><stop offset="100%" stop-color="#e0b496"/>
    </linearGradient>
    <linearGradient id="carc-hairF" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3a322a"/><stop offset="100%" stop-color="#241e18"/>
    </linearGradient>
    <linearGradient id="carc-hairB" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f0dcb0"/><stop offset="100%" stop-color="#d9bd86"/>
    </linearGradient>
  </defs>
  <g>
    <!-- тень под машиной -->
    <ellipse cx="51" cy="84" rx="40" ry="5" fill="#cbb9a6" opacity="0.55"/>

    <!-- развевающаяся фата по ветру (за фигурами) -->
    <path d="M70 38 C82 33 92 36 97 30 C90 42 84 47 96 50 C84 50 80 54 90 58 C78 56 72 60 70 50 Z" fill="url(#carc-veil)" opacity="0.92"/>
    <path d="M70 40 C80 38 88 40 95 35 C86 46 80 49 88 53 C78 52 73 55 70 48 Z" fill="#fdf9f1" opacity="0.55"/>

    <!-- кузов кабриолета -->
    <path d="M9 72 C8 62 13 58 22 57 L78 57 C90 58 94 64 94 72 C94 76 90 78 86 78 L16 78 C11 78 9 76 9 72 Z" fill="url(#carc-body)"/>
    <!-- открытый борт (вырез салона) -->
    <path d="M30 57 C32 51 38 49 46 49 L66 49 C72 49 76 52 78 57 Z" fill="url(#carc-body)"/>
    <!-- хром-полоса по борту -->
    <path d="M14 70 L88 70" stroke="#e7c2c3" stroke-width="1.4" stroke-linecap="round" opacity="0.85"/>
    <!-- передняя фара -->
    <ellipse cx="90" cy="65" rx="3" ry="3.2" fill="#f4ead7"/>
    <!-- передний бампер/решётка намёк -->
    <path d="M92 60 C95 62 95 68 92 70" stroke="#e7c2c3" stroke-width="1.2" fill="none" opacity="0.8"/>

    <!-- ===== НЕВЕСТА (слева, по пояс над бортом) ===== -->
    <!-- волосы сзади -->
    <path d="M28 36 C24 42 25 50 30 53 C34 50 34 42 32 37 Z" fill="url(#carc-hairB)"/>
    <!-- платье/торс -->
    <path d="M27 56 C26 49 30 44 36 44 C42 44 45 49 44 56 C44 60 40 61 35 61 C30 61 28 60 27 56 Z" fill="url(#carc-dress)"/>
    <!-- шея -->
    <path d="M34 43 L38 43 L37 47 L35 47 Z" fill="url(#carc-skin)"/>
    <!-- лицо -->
    <ellipse cx="36" cy="38" rx="5" ry="5.6" fill="url(#carc-skin)"/>
    <!-- светлая причёска -->
    <path d="M30 36 C30 30 33 27 37 27 C41 27 44 31 43 36 C41 33 39 32 36 33 C33 33 31 34 30 38 Z" fill="url(#carc-hairB)"/>
    <!-- рука с букетом -->
    <path d="M42 52 C46 53 48 56 49 59" stroke="url(#carc-skin)" stroke-width="2.6" fill="none" stroke-linecap="round"/>
    <!-- букет -->
    <g>
      <circle cx="50" cy="60" r="2.4" fill="#e7c2c3"/>
      <circle cx="53" cy="59" r="2.1" fill="#efd2d2"/>
      <circle cx="51.5" cy="62" r="1.9" fill="#e7c2c3"/>
      <path d="M50 62 C54 62 56 60 58 57" stroke="#6f7b45" stroke-width="1.3" fill="none" stroke-linecap="round"/>
      <path d="M52 61 C55 62 58 61 60 59" stroke="#6f7b45" stroke-width="1.1" fill="none" stroke-linecap="round"/>
    </g>

    <!-- ===== ЖЕНИХ (справа, по пояс над бортом) ===== -->
    <!-- торс в костюме -->
    <path d="M55 56 C54 48 58 43 64 43 C71 43 74 48 73 56 C73 60 69 61 64 61 C59 61 56 60 55 56 Z" fill="url(#carc-suit)"/>
    <!-- белая рубашка / бабочка -->
    <path d="M62 47 L66 47 L65 54 L63 54 Z" fill="#fbf5ea"/>
    <path d="M62 50 L66 50 L67 53 L61 53 Z" fill="#e7c2c3"/>
    <!-- шея -->
    <path d="M62 42 L66 42 L65 46 L63 46 Z" fill="url(#carc-skin)"/>
    <!-- лицо -->
    <ellipse cx="64" cy="37" rx="5" ry="5.6" fill="url(#carc-skin)"/>
    <!-- тёмные волосы -->
    <path d="M58 36 C58 29 61 26 65 26 C69 26 72 30 71 36 C69 32 67 31 64 31 C61 31 59 33 58 38 Z" fill="url(#carc-hairF)"/>
    <!-- рука жениха к невесте -->
    <path d="M56 52 C53 53 51 55 50 57" stroke="url(#carc-suit)" stroke-width="2.8" fill="none" stroke-linecap="round"/>

    <!-- колёса с розовыми деталями -->
    <circle cx="28" cy="78" r="8.5" fill="url(#carc-wheel)"/>
    <circle cx="28" cy="78" r="3.2" fill="#e7c2c3"/>
    <circle cx="74" cy="78" r="8.5" fill="url(#carc-wheel)"/>
    <circle cx="74" cy="78" r="3.2" fill="#e7c2c3"/>

    <!-- мелкие конфетти-акценты праздника -->
    <circle cx="20" cy="40" r="1.1" fill="#e7c2c3" opacity="0.8"/>
    <circle cx="84" cy="44" r="1" fill="#e7c2c3" opacity="0.75"/>
    <circle cx="48" cy="30" r="1" fill="#fbf5ea" opacity="0.8"/>
  </g>
</svg>
