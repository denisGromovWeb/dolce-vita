<svg width="256" height="256" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Лебедь">
  <defs>
    <filter id="wc-swan" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.012" numOctaves="3" seed="4" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="4.5" xChannelSelector="R" yChannelSelector="G"/>
      <feGaussianBlur stdDeviation="0.4"/>
    </filter>
    <radialGradient id="body-swan" cx="42%" cy="38%" r="75%">
      <stop offset="0%" stop-color="#fdfbf7"/>
      <stop offset="60%" stop-color="#f2e9df"/>
      <stop offset="100%" stop-color="#ddcdbf"/>
    </radialGradient>
    <linearGradient id="neck-swan" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fdfbf7"/>
      <stop offset="100%" stop-color="#ece1d4"/>
    </linearGradient>
  </defs>
  <g filter="url(#wc-swan)">
    <!-- тело -->
    <path d="M22 70 C20 56 34 48 52 50 C72 52 84 60 80 70 C76 80 58 82 44 80 C32 78 23 78 22 70 Z" fill="url(#body-swan)"/>
    <!-- крыло -->
    <path d="M40 64 C50 56 64 56 74 64 C66 70 52 72 42 70 C40 68 39 66 40 64 Z" fill="#e4d6c6" opacity="0.8"/>
    <!-- хвост -->
    <path d="M22 68 C16 64 12 66 9 62 C16 62 19 64 23 64 Z" fill="url(#body-swan)"/>
    <!-- шея -->
    <path d="M52 51 C50 38 52 26 64 22 C74 19 80 24 79 30 C78 25 72 24 67 27 C58 32 57 42 60 52 Z" fill="url(#neck-swan)"/>
    <!-- голова -->
    <path d="M76 24 C82 21 86 24 85 29 C84 33 79 34 75 31 C73 29 73 26 76 24 Z" fill="url(#neck-swan)"/>
    <!-- клюв -->
    <path d="M84 28 C90 27 93 29 92 31 C90 33 86 32 84 31 Z" fill="#d99a72"/>
    <path d="M86 29 C88 28 90 29 90 30 L86 30 Z" fill="#3a3027"/>
    <!-- глаз -->
    <circle cx="80" cy="28" r="1.2" fill="#3a3027"/>
    <!-- блик воды -->
    <path d="M26 82 C40 86 64 86 78 82" fill="none" stroke="#cbb9d1" stroke-width="1.4" opacity="0.5" stroke-linecap="round"/>
  </g>
</svg>
