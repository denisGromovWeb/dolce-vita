<svg width="256" height="256" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Молодожёны уезжают на кабриолете">
  <defs>
    <filter id="wc-carb" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.013" numOctaves="3" seed="93" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="5" xChannelSelector="R" yChannelSelector="G"/>
      <feGaussianBlur stdDeviation="0.35"/>
    </filter>
    <linearGradient id="carb-body" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3a352f"/><stop offset="100%" stop-color="#23201c"/>
    </linearGradient>
    <linearGradient id="carb-bumper" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#332f2a"/><stop offset="100%" stop-color="#1f1c18"/>
    </linearGradient>
    <radialGradient id="carb-wheel" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3a352f"/><stop offset="60%" stop-color="#2a2622"/><stop offset="100%" stop-color="#1c1916"/>
    </radialGradient>
    <linearGradient id="carb-veil" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fffaf0"/><stop offset="100%" stop-color="#f1e6d3"/>
    </linearGradient>
    <linearGradient id="carb-dress" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fdf8ee"/><stop offset="100%" stop-color="#f0e5d2"/>
    </linearGradient>
    <linearGradient id="carb-ribbon" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#eecccd"/><stop offset="100%" stop-color="#e0b2b4"/>
    </linearGradient>
  </defs>
  <g filter="url(#wc-carb)">
    <!-- speed lines -->
    <g stroke="#e7c2c3" stroke-width="1.4" stroke-linecap="round" opacity="0.55" fill="none">
      <path d="M4 40 C12 40 18 40 24 40"/>
      <path d="M3 50 C11 50 17 50 23 50"/>
      <path d="M5 60 C13 60 19 60 25 60"/>
    </g>

    <!-- bride veil flowing up-back -->
    <path d="M58 36 C68 24 80 18 94 14 C90 24 84 32 76 40 C70 44 63 44 58 40 Z" fill="url(#carb-veil)" opacity="0.92"/>
    <path d="M60 38 C70 30 82 26 92 22 C84 30 74 36 64 41 Z" fill="#fbf5ea" opacity="0.6"/>

    <!-- groom (left figure): dark shoulders + dark head -->
    <path d="M34 50 C34 42 48 42 48 50 L48 60 L34 60 Z" fill="#1f1c18"/>
    <ellipse cx="41" cy="44" rx="6" ry="6.4" fill="#251f1a"/>
    <ellipse cx="41" cy="47.5" rx="4.4" ry="3.2" fill="#e0b48f"/>

    <!-- bride (right figure): light dress, light hair -->
    <path d="M52 51 C52 43 66 43 66 51 L66 60 L52 60 Z" fill="url(#carb-dress)"/>
    <ellipse cx="59" cy="44.5" rx="6" ry="6.2" fill="#ead9b8"/>
    <ellipse cx="59" cy="48" rx="4.2" ry="3" fill="#e7c2a0"/>
    <path d="M53.5 41 C55 38 63 38 64.5 41 C62 40 56 40 53.5 41 Z" fill="#f3e6cb"/>

    <!-- car body / rear -->
    <path d="M22 58 C26 54 40 53 50 53 C60 53 74 54 78 58 C82 62 82 70 79 74 L21 74 C18 70 18 62 22 58 Z" fill="url(#carb-body)"/>
    <!-- rear deck shading -->
    <path d="M30 57 C42 55 58 55 70 57 C72 60 72 64 70 66 C58 64 42 64 30 66 C28 64 28 60 30 57 Z" fill="#2a2622" opacity="0.85"/>

    <!-- bumper -->
    <path d="M19 73 C40 71 60 71 81 73 C82 75 82 78 80 79 L20 79 C18 78 18 75 19 73 Z" fill="url(#carb-bumper)"/>

    <!-- tail lights -->
    <ellipse cx="27" cy="68" rx="3" ry="2.4" fill="#e7c2c3"/>
    <ellipse cx="73" cy="68" rx="3" ry="2.4" fill="#e7c2c3"/>

    <!-- wheels -->
    <circle cx="32" cy="80" r="8" fill="url(#carb-wheel)"/>
    <circle cx="32" cy="80" r="3.4" fill="#e7c2c3"/>
    <circle cx="68" cy="80" r="8" fill="url(#carb-wheel)"/>
    <circle cx="68" cy="80" r="3.4" fill="#e7c2c3"/>

    <!-- just married ribbon + bow -->
    <path d="M40 79 C46 84 54 84 60 79 C56 88 44 88 40 79 Z" fill="url(#carb-ribbon)"/>
    <path d="M48 80 C44 78 44 84 48 82 C52 84 52 78 48 80 Z" fill="#e7c2c3"/>
    <ellipse cx="50" cy="81" rx="1.6" ry="1.6" fill="#eecccd"/>

    <!-- trailing cans -->
    <ellipse cx="14" cy="86" rx="2.2" ry="3" fill="#f3e6cb"/>
    <ellipse cx="9" cy="89" rx="1.8" ry="2.4" fill="#fbf5ea"/>
    <path d="M20 80 C16 82 12 85 9 89" stroke="#e7c2c3" stroke-width="1" fill="none" stroke-linecap="round"/>
    <path d="M20 80 C17 81 16 84 14 86" stroke="#e7c2c3" stroke-width="1" fill="none" stroke-linecap="round"/>
  </g>
</svg>
