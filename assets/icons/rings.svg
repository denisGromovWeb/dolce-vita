<svg width="256" height="256" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Переплетённые обручальные кольца">
  <defs>
    <filter id="wc-rings" x="-20%" y="-20%" width="140%" height="140%">
