<svg width="256" height="256" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Оливковая ветвь">
  <defs>
    <filter id="wc-olive" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.014" numOctaves="3" seed="21" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="5" xChannelSelector="R" yChannelSelector="G"/>
      <feGaussianBlur stdDeviation="0.35"/>
    </filter>
    <linearGradient id="leaf-olive" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b9a5b"/>
      <stop offset="100%" stop-color="#5d6a37"/>
    </linearGradient>
    <radialGradient id="fruit-olive" cx="40%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#7c8a4e"/>
      <stop offset="100%" stop-color="#454f29"/>
    </radialGradient>
  </defs>
  <g filter="url(#wc-olive)">
    <!-- стебель -->
    <path d="M16 84 C34 70 54 52 84 20" fill="none" stroke="#6b7440" stroke-width="2.4" stroke-linecap="round"/>
    <!-- листья -->
    <g fill="url(#leaf-olive)">
      <path d="M30 72 C24 64 26 54 36 52 C40 62 38 70 30 72 Z"/>
      <path d="M44 60 C40 50 44 41 54 41 C56 51 52 59 44 60 Z"/>
      <path d="M58 47 C56 37 62 30 71 32 C70 42 65 48 58 47 Z"/>
      <path d="M40 78 C46 74 55 76 56 84 C48 86 41 84 40 78 Z" opacity="0.95"/>
      <path d="M54 66 C60 62 69 65 70 73 C62 75 55 72 54 66 Z" opacity="0.95"/>
      <path d="M68 52 C74 49 82 52 83 60 C76 62 69 59 68 52 Z" opacity="0.95"/>
      <path d="M78 33 C76 24 81 17 90 19 C89 28 85 34 78 33 Z"/>
    </g>
    <!-- оливки -->
    <g fill="url(#fruit-olive)">
      <ellipse cx="49" cy="73" rx="5.2" ry="6.6" transform="rotate(20 49 73)"/>
      <ellipse cx="64" cy="58" rx="5" ry="6.2" transform="rotate(20 64 58)"/>
    </g>
    <g fill="#9aa66a" opacity="0.55">
      <ellipse cx="47" cy="70" rx="1.5" ry="2.2"/>
      <ellipse cx="62" cy="55" rx="1.4" ry="2"/>
    </g>
  </g>
</svg>
