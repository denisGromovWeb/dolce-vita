<svg width="256" height="256" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Лилия">
  <defs>
    <filter id="wc-lily" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.013" numOctaves="3" seed="7" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="5.5" xChannelSelector="R" yChannelSelector="G"/>
      <feGaussianBlur stdDeviation="0.35"/>
    </filter>
    <radialGradient id="petal-lily" cx="50%" cy="78%" r="75%">
      <stop offset="0%" stop-color="#fbeef0"/>
      <stop offset="45%" stop-color="#f4d6da"/>
      <stop offset="100%" stop-color="#e3b3bd"/>
    </radialGradient>
    <radialGradient id="petal-lily-back" cx="50%" cy="80%" r="80%">
      <stop offset="0%" stop-color="#f2e7dd"/>
      <stop offset="100%" stop-color="#d9c4ab"/>
    </radialGradient>
  </defs>
  <g filter="url(#wc-lily)">
    <!-- задние лепестки -->
    <g fill="url(#petal-lily-back)" opacity="0.85">
      <path d="M50 56 C28 44 22 18 34 10 C44 22 49 38 50 56 Z" transform="rotate(-58 50 56)"/>
      <path d="M50 56 C28 44 22 18 34 10 C44 22 49 38 50 56 Z" transform="rotate(58 50 56)"/>
      <path d="M50 56 C28 44 22 18 34 10 C44 22 49 38 50 56 Z" transform="rotate(180 50 56)"/>
    </g>
    <!-- передние лепестки -->
    <g fill="url(#petal-lily)">
      <path d="M50 58 C30 46 24 18 38 8 C47 22 51 40 50 58 Z"/>
      <path d="M50 58 C30 46 24 18 38 8 C47 22 51 40 50 58 Z" transform="rotate(-72 50 58)"/>
      <path d="M50 58 C30 46 24 18 38 8 C47 22 51 40 50 58 Z" transform="rotate(72 50 58)"/>
      <path d="M50 58 C30 46 24 18 38 8 C47 22 51 40 50 58 Z" transform="rotate(-144 50 58)"/>
      <path d="M50 58 C30 46 24 18 38 8 C47 22 51 40 50 58 Z" transform="rotate(144 50 58)"/>
    </g>
    <!-- прожилки -->
    <g stroke="#c98f9c" stroke-width="0.8" fill="none" opacity="0.5" stroke-linecap="round">
      <path d="M50 56 C49 44 47 30 41 16"/>
      <path d="M50 56 C50 42 50 28 50 12"/>
      <path d="M50 56 C51 44 53 30 59 16"/>
    </g>
    <!-- тычинки -->
    <g stroke="#b98a4e" stroke-width="1.3" stroke-linecap="round">
      <path d="M50 56 L44 40"/><path d="M50 56 L50 38"/><path d="M50 56 L56 40"/>
    </g>
    <g fill="#a9763f">
      <circle cx="44" cy="39" r="2.2"/><circle cx="50" cy="37" r="2.2"/><circle cx="56" cy="39" r="2.2"/>
    </g>
  </g>
</svg>
