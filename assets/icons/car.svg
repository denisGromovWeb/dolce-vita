<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Свадебный кабриолет с женихом и невестой">
  <defs>
    <filter id="wc-car" x="-25%" y="-25%" width="150%" height="150%">
      <feTurbulence type="fractalNoise" baseFrequency="0.014" numOctaves="3" seed="91" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="5" xChannelSelector="R" yChannelSelector="G"/>
      <feGaussianBlur stdDeviation="0.35"/>
    </filter>
    <linearGradient id="car-body" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4a443c"/>
      <stop offset="55%" stop-color="#2a2622"/>
      <stop offset="100%" stop-color="#1c1916"/>
    </linearGradient>
    <radialGradient id="wheel-g" cx="40%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#3a342d"/>
      <stop offset="100%" stop-color="#161310"/>
    </radialGradient>
    <linearGradient id="veil-g" x1="100%" y1="0%" x2="0%" y2="50%">
      <stop offset="0%" stop-color="#fbf5ea"/>
      <stop offset="100%" stop-color="#efe4d0"/>
    </linearGradient>
    <linearGradient id="dress-g" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fdf8ef"/>
      <stop offset="100%" stop-color="#ece0cb"/>
    </linearGradient>
    <radialGradient id="hub-g" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#e7c2c3"/>
      <stop offset="100%" stop-color="#c79a9b"/>
    </radialGradient>
  </defs>
  <g filter="url(#wc-car)">
    <!-- развевающаяся фата сзади -->
    <path d="M58 40 C44 33 30 34 14 30 C26 38 30 40 22 44 C34 44 40 43 50 47 C42 50 38 52 30 53 C44 56 54 50 60 48 Z" fill="url(#veil-g)" opacity="0.92"/>
    <!-- ленты сзади -->
    <path d="M40 60 C30 64 22 66 12 72" fill="none" stroke="#e7c2c3" stroke-width="1.6" stroke-linecap="round" opacity="0.85"/>
    <path d="M42 63 C32 68 26 72 18 80" fill="none" stroke="#fbf5ea" stroke-width="1.4" stroke-linecap="round" opacity="0.8"/>
    <!-- кузов -->
    <path d="M16 66 C18 56 26 54 38 54 C46 47 56 46 64 53 C74 53 84 56 88 66 C89 72 86 76 80 76 L24 76 C18 76 15 72 16 66 Z" fill="url(#car-body)"/>
    <!-- мягкий блик на кузове -->
    <path d="M24 60 C34 56 54 55 70 58 C58 59 40 59 26 63 Z" fill="#6a6056" opacity="0.5"/>
    <!-- салон / вырез -->
    <path d="M40 54 C46 50 56 50 62 54 C58 56 46 56 40 54 Z" fill="#15120f" opacity="0.6"/>
    <!-- жених: тёмный костюм + голова -->
    <path d="M52 52 C49 49 49 44 53 43 C57 44 56 49 53 52 Z" fill="#c9a98c" opacity="0.9"/>
    <circle cx="52.6" cy="40.5" r="2.6" fill="#caa886"/>
    <path d="M50 36 C51 34 55 34 56 36 C55 35 51 35 50 36 Z" fill="#2a2622"/>
    <path d="M48 54 C50 47 56 47 58 54 Z" fill="#1f1c18"/>
    <!-- невеста: платье + голова -->
    <path d="M58 53 C56 47 50 46 49 52 C52 55 56 55 58 53 Z" fill="url(#dress-g)"/>
    <circle cx="51" cy="42" r="2.5" fill="#e8c6a4"/>
    <!-- волосы невесты, развеваются назад -->
    <path d="M50 40 C46 39 43 40 41 43 C45 41 49 42 51 43 Z" fill="#6b513a"/>
    <!-- передняя часть фаты на голове -->
    <path d="M50 40 C45 38 40 39 35 38 C42 41 47 42 51 43 Z" fill="#fbf5ea" opacity="0.85"/>
    <!-- розовый бант спереди на капоте -->
    <path d="M78 60 C75 57 75 63 78 61 C81 63 81 57 78 60 Z" fill="url(#hub-g)"/>
    <circle cx="78" cy="60" r="1" fill="#d8a9aa"/>
    <!-- колёса -->
    <ellipse cx="32" cy="77" rx="8" ry="8" fill="url(#wheel-g)"/>
    <ellipse cx="72" cy="77" rx="8" ry="8" fill="url(#wheel-g)"/>
    <circle cx="32" cy="77" r="3" fill="#e7c2c3" opacity="0.85"/>
    <circle cx="72" cy="77" r="3" fill="#e7c2c3" opacity="0.85"/>
    <!-- линии скорости -->
    <path d="M6 58 C12 58 16 58 20 58" fill="none" stroke="#bcae94" stroke-width="1.1" stroke-linecap="round" opacity="0.55"/>
    <path d="M4 64 C10 64 14 64 18 64" fill="none" stroke="#bcae94" stroke-width="1" stroke-linecap="round" opacity="0.45"/>
  </g>
</svg>
