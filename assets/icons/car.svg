<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Свадебный ретро-кабриолет с бантом">
  <defs>
    <filter id="wc-car" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.014" numOctaves="3" seed="90" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="5" xChannelSelector="R" yChannelSelector="G"/>
      <feGaussianBlur stdDeviation="0.35"/>
    </filter>
    <linearGradient id="car-body" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#46403a"/>
      <stop offset="55%" stop-color="#2a2622"/>
      <stop offset="100%" stop-color="#1c1916"/>
    </linearGradient>
    <linearGradient id="car-hood" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#564e46"/>
      <stop offset="100%" stop-color="#2a2622"/>
    </linearGradient>
    <radialGradient id="wheel-out" cx="42%" cy="38%" r="65%">
      <stop offset="0%" stop-color="#3a3531"/>
      <stop offset="100%" stop-color="#171411"/>
    </radialGradient>
    <radialGradient id="wheel-hub" cx="42%" cy="38%" r="70%">
      <stop offset="0%" stop-color="#f3ead9"/>
      <stop offset="100%" stop-color="#cdbf9f"/>
    </radialGradient>
    <linearGradient id="bow-pink" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f3d7d8"/>
      <stop offset="100%" stop-color="#e7c2c3"/>
    </linearGradient>
    <radialGradient id="bow-knot" cx="45%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#f6e2e2"/>
      <stop offset="100%" stop-color="#dcb0b1"/>
    </radialGradient>
    <radialGradient id="glass" cx="40%" cy="30%" r="75%">
      <stop offset="0%" stop-color="#e9ead8"/>
      <stop offset="100%" stop-color="#bfc3ad"/>
    </radialGradient>
  </defs>
  <g filter="url(#wc-car)">
    <!-- тень под машиной -->
    <ellipse cx="51" cy="80" rx="40" ry="5.5" fill="#cdbf9f" opacity="0.45"/>

    <!-- кузов -->
    <path d="M12 70 C11 60 16 56 24 55 C30 50 38 46 50 46 C62 46 70 50 76 55 C84 56 90 60 90 68 C90 73 86 75 80 75 L18 75 C13 75 12 73 12 70 Z" fill="url(#car-body)"/>

    <!-- салон / открытый верх -->
    <path d="M34 48 C40 43 46 41 53 41 C62 41 68 44 71 50 C64 47 58 46 51 46 C44 46 39 47 34 52 Z" fill="url(#car-hood)"/>
    <!-- лобовое стекло -->
    <path d="M52 42 C58 42 63 45 66 50 L53 50 C52 47 52 44 52 42 Z" fill="url(#glass)" opacity="0.85"/>

    <!-- блик на кузове -->
    <path d="M22 58 C34 53 48 51 62 52 C50 54 38 55 26 60 Z" fill="#6b625a" opacity="0.6"/>

    <!-- колёса -->
    <circle cx="30" cy="74" r="11" fill="url(#wheel-out)"/>
    <circle cx="72" cy="74" r="11" fill="url(#wheel-out)"/>
    <circle cx="30" cy="74" r="4.6" fill="url(#wheel-hub)"/>
    <circle cx="72" cy="74" r="4.6" fill="url(#wheel-hub)"/>

    <!-- фара -->
    <ellipse cx="87" cy="64" rx="3.4" ry="3" fill="#f3ead9" opacity="0.9"/>

    <!-- ленты от банта по капоту -->
    <path d="M50 30 C44 38 40 50 30 58" fill="none" stroke="#e7c2c3" stroke-width="2.4" stroke-linecap="round" opacity="0.95"/>
    <path d="M50 30 C58 38 64 50 76 58" fill="none" stroke="#f0d2d3" stroke-width="2.4" stroke-linecap="round" opacity="0.95"/>

    <!-- бант на капоте -->
    <g>
      <path d="M50 28 C42 20 32 22 33 30 C34 37 44 34 50 30 Z" fill="url(#bow-pink)"/>
      <path d="M50 28 C58 20 68 22 67 30 C66 37 56 34 50 30 Z" fill="url(#bow-pink)"/>
      <path d="M47 31 C45 38 43 43 41 47 C45 45 48 41 50 35 Z" fill="#ddb1b2"/>
      <path d="M53 31 C55 38 57 43 59 47 C55 45 52 41 50 35 Z" fill="#ddb1b2"/>
      <ellipse cx="50" cy="30" rx="4.6" ry="4.2" fill="url(#bow-knot)"/>
    </g>
  </g>
</svg>
